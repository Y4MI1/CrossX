<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="css/mobile-common.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/favicon.png">
    <title>고객문의 - Cross X</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/contact.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="로고"></a></div>
        <!-- 사이드바 버튼을 상단 바의 오른쪽에 배치 -->
        <div class="menu-container">
            <div class="menu-icon" onclick="toggleSideBar()">☰</div>
        </div>
    </header>
    
    <!-- 사이드바 -->
    <aside class="side-bar">
        <div class="side-bar__icon-box" onclick="toggleSideBar()">
            <div class="side-bar__icon-1">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-home"></i> 메인</a></li>
            <li><a href="about.html"><i class="fa-solid fa-ship"></i> 소개</a></li>
            <li><a href="reservation.html"><i class="fa-solid fa-calendar-check"></i> 예약</a></li>
            <li><a href="contact.html"><i class="fa-solid fa-comments"></i> 고객문의</a></li>
            <li id="loginMenuItem"><a href="login.html"><i class="fa-solid fa-sign-in-alt"></i> 로그인</a></li>
            <li id="userInfo" style="display: none;" class="user-profile">
                <div class="user-info-container">
                    <div class="user-info-left">
                        <i class="fa-solid fa-user"></i>
                        <span id="username"></span>
                    </div>
                    <div class="user-info-right" onclick="logout()">
                        <i class="fa-solid fa-sign-out-alt"></i>
                        <span>로그아웃</span>
                    </div>
                </div>
            </li>
        </ul>
    </aside>

    <main class="contact-main">
        <div class="contact-container">
            <h1>고객문의</h1>
            <form id="contactForm" onsubmit="return handleContact(event)">
                <div class="input-group">
                    <input type="text" id="name" placeholder="이름" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" placeholder="이메일" required>
                </div>
                <div class="input-group">
                    <select id="category" required>
                        <option value="">문의 유형 선택</option>
                        <option value="reservation">예약 문의</option>
                        <option value="service">서비스 문의</option>
                        <option value="technical">기술적 문의</option>
                        <option value="other">기타</option>
                    </select>
                </div>
                <div class="input-group">
                    <textarea id="message" placeholder="문의 내용" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </main>
    
    <script src="js/script.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
