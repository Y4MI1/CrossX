<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="stylesheet" href="css/mobile-common.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Cross X</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo"><a href="index.html"><img src="images/logo.png" alt="로고"></a></div>
        <div class="menu-container">
            <div class="menu-icon" onclick="toggleSideBar()">☰</div>
        </div>
    </header>
    
    <!-- 사이드바 -->
    <aside class="side-bar">
        <div class="side-bar__icon-box" onclick="toggleSideBar()">
            <div class="side-bar__icon-1">
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-home"></i> 메인</a></li>
            <li><a href="about.html"><i class="fa-solid fa-ship"></i> 소개</a></li>
            <li><a href="reservation.html"><i class="fa-solid fa-calendar-check"></i> 예약</a></li>
            <li><a href="contact.html"><i class="fa-solid fa-comments"></i> 고객문의</a></li>
            <li id="loginMenuItem"><a href="login.html"><i class="fa-solid fa-sign-in-alt"></i> 로그인</a></li>
            <li id="userInfo" style="display: none;" class="user-profile">
                <div class="user-info-container">
                    <div class="user-info-left">
                        <i class="fa-solid fa-user"></i>
                        <span id="username"></span>
                    </div>
                    <div class="user-info-right" onclick="logout()">
                        <i class="fa-solid fa-sign-out-alt"></i>
                        <span>로그아웃</span>
                    </div>
                </div>
            </li>
        </ul>
    </aside>

    <main class="login-main">
        <div class="login-container">
            <div class="login-box">
                <h1>Cross X</h1>
                <form id="loginForm" onsubmit="return handleLogin(event)">
                    <div class="input-group">
                        <input type="text" id="loginUsername" placeholder="아이디" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="비밀번호" required>
                    </div>
                    <button type="submit" class="login-btn">로그인</button>
                </form>
                <div class="signup-link">
                    admin, pass1234로<br>임시 로그인 하실 수 있습니다.
                </div>
            </div>
        </div>
    </main>
    
    <script src="js/script.js"></script>

    <div id="toast" class="toast-message"></div>
</body>
</html>
